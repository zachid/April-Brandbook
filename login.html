<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Brandbook Generator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --brand-accent: #8b5cf6;
      --brand-accent-2: #06b6d4;

      --bg-base: #080810;
      --bg-elevated: #0f0f1a;
      --bg-card: #13131f;

      --border: rgba(255, 255, 255, 0.06);
      --border-medium: rgba(255, 255, 255, 0.10);
      --border-strong: rgba(255, 255, 255, 0.18);

      --text-primary: #f0f0ff;
      --text-secondary: rgba(240, 240, 255, 0.55);
      --text-muted: rgba(240, 240, 255, 0.28);

      --font-sans: 'Manrope', system-ui, -apple-system, sans-serif;

      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-6: 24px;
      --sp-8: 32px;
      --sp-10: 40px;
      --sp-12: 48px;

      --r-md: 10px;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Layout ────────────────────────────── */
    .login-wrapper {
      display: flex;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      padding: var(--sp-6);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border-medium);
      border-radius: var(--r-md);
      padding: var(--sp-12);
      display: flex;
      flex-direction: column;
      gap: var(--sp-8);
    }

    /* ── Header ────────────────────────────── */
    .login-header {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
    }

    .login-logo {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .login-title {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    .login-tagline {
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 600;
      line-height: 1.3;
      color: var(--text-primary);
      margin-bottom: var(--sp-4);
    }

    .login-tagline .accent {
      color: var(--brand-accent);
    }

    .login-subtitle {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ── Form ──────────────────────────────── */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
    }

    .google-signin-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-3);
      background: white;
      color: #080810;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: var(--r-md);
      padding: var(--sp-3) var(--sp-4);
      height: 48px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 150ms ease;
      font-family: var(--font-sans);
    }

    .google-signin-btn:hover:not(:disabled) {
      border-color: rgba(0, 0, 0, 0.24);
      background: #fafafa;
      transform: translateY(-1px);
    }

    .google-signin-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .google-signin-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .google-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* ── Messages ──────────────────────────── */
    .error-message,
    .success-message {
      padding: var(--sp-3) var(--sp-4);
      font-size: 13px;
      font-weight: 500;
      border: 1px solid;
      border-radius: var(--r-md);
      display: none;
      line-height: 1.5;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.08);
      border-color: rgba(239, 68, 68, 0.25);
      color: #fca5a5;
    }

    .success-message {
      background: rgba(74, 222, 128, 0.08);
      border-color: rgba(74, 222, 128, 0.25);
      color: #86efac;
    }

    .error-message.show,
    .success-message.show {
      display: block;
    }

    /* ── Divider ───────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: var(--sp-4) 0;
    }

    /* ── Footer ────────────────────────────── */
    .login-footer {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .login-footer a {
      color: var(--brand-accent);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 150ms;
    }

    .login-footer a:hover {
      opacity: 0.8;
    }

    /* ── Responsive ────────────────────────── */
    @media (max-width: 640px) {
      .login-wrapper {
        padding: var(--sp-4);
      }

      .login-card {
        padding: var(--sp-6);
        gap: var(--sp-6);
      }

      .login-title {
        font-size: 28px;
      }

      .google-signin-btn {
        height: 44px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <!-- Header -->
      <div class="login-header">
        <div class="login-logo">Brandbook Generator</div>
        <h1 class="login-title">Sign In</h1>
        <p class="login-tagline">
          Meet <span class="accent">April</span>.<br />
          Your brand guideline creator.
        </p>
        <p class="login-subtitle">
          Access your brand guidelines with your Google account
        </p>
      </div>

      <!-- Form -->
      <form class="login-form" id="authForm">
        <button type="button" class="google-signin-btn" id="googleSigninBtn">
          <svg
            class="google-icon"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            />
            <path
              fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            />
            <path
              fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            />
            <path
              fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            />
          </svg>
          Continue with Google
        </button>

        <div class="error-message" id="errorMsg"></div>
        <div class="success-message" id="successMsg"></div>
      </form>

      <!-- Divider -->
      <div class="divider"></div>

      <!-- Footer -->
      <div class="login-footer">
        Questions?
        <a href="mailto:support@brandbook.app">Contact support</a>
      </div>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const googleSigninBtn = document.getElementById('googleSigninBtn');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    // Initialize Supabase on page load
    document.addEventListener('DOMContentLoaded', async () => {
      await initSupabase();

      // Check if already logged in
      const session = await getAuthSession();
      if (session) {
        window.location.href = 'index.html';
      }
    });

    // Google Sign-In
    googleSigninBtn.addEventListener('click', async (e) => {
      e.preventDefault();

      googleSigninBtn.disabled = true;
      const originalText = googleSigninBtn.innerHTML;
      googleSigninBtn.textContent = 'Signing in...';
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');

      try {
        console.log('[Login] Starting Google sign-in...');
        await signInWithGoogle();
        showSuccess('Signed in! Redirecting...');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      } catch (err) {
        console.error('[Login] Error:', err);
        showError(err.message || 'Sign in failed. Check console for details.');
        googleSigninBtn.disabled = false;
        googleSigninBtn.innerHTML = originalText;
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.classList.add('show');
    }

    // Prevent form submission
    document.getElementById('authForm').addEventListener('submit', (e) => {
      e.preventDefault();
    });
  </script>
</body>
</html>
