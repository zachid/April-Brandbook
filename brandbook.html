<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Brand Guidelines</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/swiss.css">
</head>
<body>

  <div class="progress-bar" id="progress-bar"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-logo" id="sidebar-logo">
        <a href="index.html" class="sidebar-back" title="All brands">←</a>
        <span id="sidebar-brand-name"></span>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-export">
      <button class="export-btn" onclick="__bbExportPDF && __bbExportPDF()" title="Print / Save as PDF">PDF</button>
      <button class="export-btn" onclick="__bbExportHTML && __bbExportHTML()" title="Download as HTML file">HTML</button>
      <button class="export-btn" onclick="__bbExportMD && __bbExportMD()" title="Download as Markdown file">MD</button>
    </div>
    <div class="sidebar-bottom">
      <span class="sidebar-year" id="sidebar-year"></span>
      <span class="sidebar-sep">·</span>
      <span class="sidebar-label">Brand Guidelines</span>
    </div>
  </aside>

  <main class="content" id="content"></main>

  <!-- Load project data, auth, then app -->
  <script src="js/projects.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>

  <!-- Authentication Check -->
  <script>
  (function() {
    'use strict';

    // Dev bypass: skip auth on localhost for local testing
    const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

    // Check auth first, then load app
    document.addEventListener('DOMContentLoaded', async () => {
      if (!IS_LOCAL) {
        await initSupabase();
        const user = await getAuthUser();
        if (!user) {
          window.location.href = 'login.html';
          return;
        }
      }

      // Authenticated (or local dev) — load the app
      loadApp();
    });

    // The main app loading logic (moved into loadApp function)
    function loadApp() {
    // Resolve BRAND from URL ?id= → sessionStorage → localStorage.
    // Never falls back to brand.config.js — if nothing found, redirect to dashboard.
    (function() {
      function loadApp() {
        var a = document.createElement('script'); a.src = 'js/app.js';
        var t = document.createElement('script'); t.src = 'js/theme.js';
        a.onload = function() { document.body.appendChild(t); };
        document.body.appendChild(a);
      }

      function showNotFound(reason) {
        console.warn('[Brandbook] No brand found —', reason, '— redirecting to dashboard');
        window.location.replace('index.html');
      }

      var id = new URLSearchParams(location.search).get('id');
      console.log('[Brandbook] boot — id from URL:', id);

      // ── sessionStorage lookup ─────────────────────────────────────
      function fromSession(matchId) {
        try {
          var pending = JSON.parse(sessionStorage.getItem('bb_pending_brand') || 'null');
          if (pending && pending.id && (!matchId || pending.id === matchId)) {
            console.log('[Brandbook] found bb_pending_brand id=%s name=%s', pending.id, pending.name);
            sessionStorage.removeItem('bb_pending_brand');
            return pending;
          }
          var last = JSON.parse(sessionStorage.getItem('bb_last_brand') || 'null');
          if (last && last.id && (!matchId || last.id === matchId)) {
            console.log('[Brandbook] found bb_last_brand id=%s name=%s', last.id, last.name);
            return last;
          }
        } catch(e) { console.warn('[Brandbook] sessionStorage read error:', e); }
        return null;
      }

      if (id) {
        // 1. sessionStorage (fastest — set by intake.html and index.html before navigation)
        var ss = fromSession(id);
        if (ss) { window.BRAND = ss; console.log('[Brandbook] BRAND set from sessionStorage:', ss.name); loadApp(); return; }

        // 2. localStorage
        try {
          var data = Projects.get(id);
          if (data) {
            console.log('[Brandbook] BRAND set from localStorage id=%s name=%s', data.id, data.name);
            // Refresh sessionStorage for next visit
            sessionStorage.setItem('bb_last_brand', JSON.stringify(data));
            window.BRAND = data; loadApp(); return;
          }
        } catch(e) { console.warn('[Brandbook] localStorage read error:', e); }

        // 3. Nothing found with this id — back to dashboard
        showNotFound('id=' + id + ' not in sessionStorage or localStorage');
        return;
      }

      // No ?id= in URL — try sessionStorage (catches stripped query strings)
      var ss = fromSession(null);
      if (ss) { window.BRAND = ss; console.log('[Brandbook] BRAND set from sessionStorage (no id):', ss.name); loadApp(); return; }

      // No id, no session — on localhost load demo brand, otherwise redirect
      if (IS_LOCAL) {
        console.log('[Brandbook] localhost dev — loading demo BRAND');
        window.BRAND = {
          id: 'demo',
          name: 'April Studio',
          year: new Date().getFullYear(),
          accentColor: '#8B5CF6',
          accentColor2: '#06B6D4',
          coverBg: '#080810',
          story: { headline: 'Where brands find their voice.', description: 'April is a Swiss-style brand guidelines generator — precise, structured, and built for clarity.' },
          foundation: { mission: 'To help brands communicate with confidence and consistency.', vision: 'A world where every brand speaks clearly.', values: ['Clarity', 'Precision', 'Restraint'] },
          logo: { primary: '', symbol: '', typographic: '', full: '', alt: [] },
          colors: { primary: [{ hex: '#8B5CF6', name: 'Violet', usage: 'Primary accent' }, { hex: '#080810', name: 'Space', usage: 'Background' }], secondary: [{ hex: '#06B6D4', name: 'Cyan', usage: 'Secondary accent' }], functional: [] },
          typography: { display: { name: 'Syne', weights: ['800'], usage: 'Headlines, display text' }, body: { name: 'Manrope', weights: ['400', '600', '700'], usage: 'Body copy, UI labels' }, conventions: [] },
          imagery: { style: { description: 'Clean, geometric, high-contrast photography with dark environments.', keywords: ['minimal', 'geometric', 'dark', 'structured'], photos: [] }, dos: ['High contrast', 'Geometric composition', 'Minimal subjects'], donts: ['Busy backgrounds', 'Warm tones', 'Soft focus'] },
          voice: { description: 'Precise, confident, and purposeful. We say more with less.', attributes: ['Precise', 'Direct', 'Structured'], weare: ['Clear', 'Confident', 'Minimal'], werenot: ['Verbose', 'Decorative', 'Vague'], channelTones: [] },
          applications: [{ name: 'Business Card', description: 'Minimal, left-aligned, hairline rules.' }]
        };
        loadApp(); return;
      }
      showNotFound('no ?id= in URL and no sessionStorage brand');
    })();
    }
  })();
  </script>

  <style>
    .sidebar-back {
      font-size: 16px;
      color: var(--text-muted);
      text-decoration: none;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .sidebar-back:hover { color: var(--brand-accent); }
    #sidebar-brand-name {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }
  </style>
</body>
</html>
